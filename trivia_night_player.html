<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Night — Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1f1f1f; --border: rgba(255,255,255,0.15);
    --accent: #e02424; --accent2: #ff5252; --green: #3dd68c; --red: #e02424;
    --text: #ffffff; --muted: #9a9a9a;
    --font-head: 'Nunito', sans-serif; --font-body: 'Inter', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .game-wrapper { display: flex; align-items: flex-start; gap: 28px; width: 100%; max-width: 780px; justify-content: center; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 36px 32px; width: 100%; max-width: 560px; flex: 1; min-width: 0; }
  .logo { font-family: var(--font-head); font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 28px; }
  .logo span { color: var(--accent); }

  h2 { font-family: var(--font-head); font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px; }
  .sub { color: var(--muted); text-align: center; font-size: 14px; margin-bottom: 24px; }
  input[type="text"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: var(--font-body); font-size: 16px; padding: 14px 16px; outline: none;
    transition: border-color 0.2s; margin-bottom: 14px; text-align: center;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  .btn-join {
    width: 100%; padding: 16px; border-radius: 10px; border: none; background: var(--accent); color: white;
    font-family: var(--font-head); font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
  }
  .btn-join:hover { background: #b81c1c; transform: translateY(-1px); }
  .btn-join:active { transform: translateY(0); }
  .btn-join:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .waiting-anim { text-align: center; padding: 20px; }
  .pulse-ring { width: 72px; height: 72px; border-radius: 50%; background: rgba(224,36,36,0.2); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.08); opacity:0.7; } }
  .pulse-inner { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); }

  .q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .q-label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .timer-chip { background: rgba(247,194,106,0.12); border: 1px solid rgba(247,194,106,0.3); color: var(--accent2); font-family: var(--font-head); font-size: 16px; font-weight: 800; padding: 4px 14px; border-radius: 99px; min-width: 48px; text-align: center; transition: all 0.3s; }
  .timer-chip.urgent { background: rgba(242,107,107,0.12); border-color: rgba(242,107,107,0.3); color: var(--red); }
  .q-text { font-family: var(--font-head); font-size: 20px; font-weight: 700; line-height: 1.35; margin-bottom: 24px; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt-btn {
    padding: 16px 12px; border-radius: 12px; border: 1.5px solid var(--border);
    background: var(--surface2); color: var(--text); font-family: var(--font-body); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(224,36,36,0.1); transform: translateY(-2px); }
  .opt-btn:active:not(:disabled) { transform: translateY(0); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.selected { border-color: var(--accent); background: rgba(224,36,36,0.18); }
  .opt-btn.correct { border-color: var(--green); background: rgba(61,214,140,0.12); color: var(--green); }
  .opt-btn.wrong { border-color: var(--red); background: rgba(242,107,107,0.1); color: var(--red); opacity: 0.7; }
  .opt-letter { font-size: 12px; font-weight: 800; width: 26px; height: 26px; border-radius: 6px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; }
  .correct .opt-letter { background: rgba(61,214,140,0.2); color: var(--green); }

  .score-bar { display: flex; align-items: center; gap: 10px; margin-top: 20px; padding: 12px 16px; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); }
  .score-label { font-size: 12px; color: var(--muted); flex: 1; }
  .score-val { font-family: var(--font-head); font-size: 20px; font-weight: 800; color: var(--accent); }

  .result-banner { text-align: center; padding: 16px; border-radius: 12px; margin-top: 16px; font-weight: 600; font-size: 15px; }
  .result-banner.correct-r { background: rgba(61,214,140,0.1); border: 1px solid rgba(61,214,140,0.3); color: var(--green); }
  .result-banner.wrong-r { background: rgba(242,107,107,0.1); border: 1px solid rgba(242,107,107,0.3); color: var(--red); }
  .result-banner.timeout-r { background: rgba(247,194,106,0.1); border: 1px solid rgba(247,194,106,0.3); color: var(--accent2); }

  .lb-list { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }
  .lb-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(255,255,255,0.08); border-radius: 8px; border: 1px solid var(--border); }
  .lb-row.me { border-color: rgba(224,36,36,0.4); background: rgba(224,36,36,0.08); }
  .lb-row.rank-1 { border-color: rgba(255,215,0,0.5); background: rgba(255,215,0,0.1); }
  .lb-row.rank-2 { border-color: rgba(192,192,192,0.5); background: rgba(192,192,192,0.08); }
  .lb-row.rank-3 { border-color: rgba(205,127,50,0.5); background: rgba(205,127,50,0.08); }
  .lb-rank { font-family: var(--font-head); font-size: 14px; font-weight: 800; color: var(--muted); min-width: 22px; }
  .lb-name { flex: 1; font-size: 14px; }
  .lb-score { font-family: var(--font-head); font-size: 16px; font-weight: 800; color: var(--accent); }

  .screen { display: none; }
  .screen.active { display: block; }

  .answered-msg { text-align: center; padding: 24px; color: var(--muted); font-size: 15px; }
  .answered-msg .big { font-family: var(--font-head); font-size: 32px; margin-bottom: 10px; }

  .gameover-card { text-align: center; }
  .gameover-card h2 { font-size: 28px; margin-bottom: 8px; }
  .final-score { font-family: var(--font-head); font-size: 48px; font-weight: 800; color: var(--accent); margin: 16px 0 4px; }
  .final-label { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  /* ── Dim mode ── */
  html[data-theme="dim"] { --bg:#252525; --surface:#2f2f2f; --surface2:#383838; --border:rgba(255,255,255,0.12); --text:#e8e8e8; --muted:#888888; }

  /* ── Light mode ── */
  html[data-theme="light"] { --bg:#f0f0f0; --surface:#ffffff; --surface2:#e8e8e8; --border:rgba(0,0,0,0.12); --text:#111111; --muted:#555555; }
  html[data-theme="light"] .opt-letter { background: rgba(0,0,0,0.07); }
  html[data-theme="light"] .lb-row { background: rgba(0,0,0,0.04); }
  html[data-theme="light"] input[type="text"] { background: var(--surface2); }
  #theme-toggle { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; padding: 4px 10px; cursor: pointer; line-height: 1; transition: border-color 0.2s; }
  #theme-toggle:hover { border-color: var(--accent); }

  /* ── Monster sidebar ── */
  .monster-sidebar {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    flex-shrink: 0; width: 160px; padding-top: 28px; position: relative;
  }
  .monster-svg {
    animation: monster-float 3s ease-in-out infinite;
    filter: drop-shadow(0 6px 18px rgba(46,204,113,0.25));
    overflow: visible;
  }
  @keyframes monster-float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
  @keyframes monster-nom {
    0%   { transform: translateY(0)   scale(1)    rotate(0deg); }
    20%  { transform: translateY(-7px) scale(1.06) rotate(-4deg); }
    45%  { transform: translateY(-11px) scale(1.09) rotate(4deg); }
    70%  { transform: translateY(-5px) scale(1.03) rotate(-1deg); }
    100% { transform: translateY(0)   scale(1)    rotate(0deg); }
  }
  .monster-svg.eating { animation: monster-nom 0.5s ease forwards; }
  .monster-svg.eating .mouth-smile { display: none; }
  .monster-svg.eating .mouth-nom   { display: block !important; }
  .monster-svg.eating #lpupil { transform: translate(2px, 5px); }
  .monster-svg.eating #rpupil { transform: translate(-2px, 5px); }
  .snack-counter {
    font-family: var(--font-head); font-size: 13px; font-weight: 700;
    color: var(--muted); background: var(--surface2); border: 1px solid var(--border);
    border-radius: 99px; padding: 3px 14px;
  }
  .feed-btn {
    background: rgba(46,204,113,0.12); border: 1.5px solid rgba(46,204,113,0.35);
    color: #2ecc71; font-family: var(--font-head); font-size: 14px; font-weight: 700;
    padding: 9px 20px; border-radius: 99px; cursor: pointer; transition: all 0.15s;
  }
  .feed-btn:hover  { background: rgba(46,204,113,0.24); transform: scale(1.06); }
  .feed-btn:active { transform: scale(0.95); }
  .monster-label { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.3px; }
  .pellet {
    position: absolute; width: 11px; height: 11px; border-radius: 50%;
    background: var(--accent); left: 50%; bottom: 58px;
    transform: translateX(-50%); pointer-events: none;
    animation: pellet-rise 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes pellet-rise {
    0%   { transform: translateX(-50%) translateY(0)     scale(1);   opacity: 1; }
    65%  { opacity: 1; }
    100% { transform: translateX(-50%) translateY(-160px) scale(0.3); opacity: 0; }
  }
  @media (max-width: 720px) {
    .game-wrapper { flex-direction: column; align-items: center; }
    .monster-sidebar {
      flex-direction: row; width: 100%; max-width: 560px;
      padding: 16px 20px; padding-top: 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 18px;
      justify-content: center; gap: 20px;
    }
    .monster-svg { width: 90px; height: 98px; }
  }
</style>
</head>
<body>
<div class="game-wrapper">
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
    <div class="logo" style="margin-bottom:0;">Trivia<span>Night</span></div>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀️</button>
  </div>

  <!-- JOIN SCREEN -->
  <div class="screen active" id="screen-join">
    <h2>Join the Game</h2>
    <div class="sub">Enter your name to play</div>
    <input type="text" id="name-input" placeholder="Your name..." maxlength="24" autocomplete="off">
    <div id="name-error" style="color:#f26b6b;font-size:13px;margin-top:6px;min-height:18px;"></div>
    <button class="btn-join" onclick="joinGame()" id="join-btn">Join →</button>
  </div>

  <!-- WAITING SCREEN -->
  <div class="screen" id="screen-waiting">
    <div class="waiting-anim">
      <div class="pulse-ring"><div class="pulse-inner"></div></div>
      <h2>You're In!</h2>
      <p class="sub" style="margin-bottom:0;">Waiting for the host to start the game...</p>
      <p style="margin-top:16px;color:var(--accent);font-family:var(--font-head);font-size:18px;font-weight:700;" id="wait-name"></p>
    </div>
  </div>

  <!-- QUESTION SCREEN -->
  <div class="screen" id="screen-question">
    <div class="q-header">
      <span class="q-label" id="p-q-label">Q1</span>
      <span class="timer-chip" id="p-timer">30</span>
    </div>
    <div class="q-text" id="p-q-text"></div>
    <div class="options-grid" id="p-options"></div>
    <div id="p-result-banner"></div>
    <div class="score-bar">
      <span class="score-label">Your Score</span>
      <span class="score-val" id="p-score">0</span>
    </div>
  </div>

  <!-- ANSWERED SCREEN -->
  <div class="screen" id="screen-answered">
    <div class="answered-msg">
      <div class="big">✓</div>
      <div>Answer locked in!</div>
      <div style="font-size:13px;margin-top:8px;color:var(--muted);">Waiting for other players...</div>
    </div>
    <div class="score-bar">
      <span class="score-label">Your Score</span>
      <span class="score-val" id="p-score2">0</span>
    </div>
  </div>

  <!-- REVEAL SCREEN -->
  <div class="screen" id="screen-reveal">
    <div class="q-header">
      <span class="q-label" id="rv-q-label">Q1 Result</span>
    </div>
    <div class="q-text" id="rv-q-text"></div>
    <div class="options-grid" id="rv-options"></div>
    <div id="rv-result-banner"></div>
    <div class="score-bar">
      <span class="score-label">Your Score</span>
      <span class="score-val" id="p-score3">0</span>
    </div>
    <div style="margin-top:20px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Leaderboard</div>
      <div class="lb-list" id="rv-lb"></div>
    </div>
  </div>

  <!-- GAMEOVER SCREEN -->
  <div class="screen" id="screen-gameover">
    <div class="gameover-card">
      <h2>🎉 Game Over!</h2>
      <div class="final-score" id="final-score">0</div>
      <div class="final-label">your final score</div>
      <div class="lb-list" id="final-lb"></div>
    </div>
  </div>
</div>

<!-- ── Monster sidebar ──────────────────────────────────────────────────── -->
<div class="monster-sidebar">
  <svg class="monster-svg" viewBox="0 38 140 120" xmlns="http://www.w3.org/2000/svg" width="140" height="120">
    <!-- Body -->
    <ellipse cx="70" cy="122" rx="37" ry="30" fill="#27ae60"/>
    <!-- Head -->
    <circle cx="70" cy="80" r="40" fill="#2ecc71"/>
    <!-- Head sheen -->
    <ellipse cx="56" cy="63" rx="9" ry="5" fill="rgba(255,255,255,0.2)" transform="rotate(-22 56 63)"/>
    <!-- Left arm -->
    <ellipse cx="29" cy="112" rx="9" ry="17" fill="#27ae60" transform="rotate(22 29 112)"/>
    <circle cx="23" cy="127" r="8" fill="#2ecc71"/>
    <!-- Right arm -->
    <ellipse cx="111" cy="112" rx="9" ry="17" fill="#27ae60" transform="rotate(-22 111 112)"/>
    <circle cx="117" cy="127" r="8" fill="#2ecc71"/>
    <!-- Left eye -->
    <circle cx="54" cy="76" r="13" fill="white"/>
    <circle id="lpupil" cx="57" cy="79" r="7" fill="#111"/>
    <circle cx="60" cy="74" r="2.5" fill="white"/>
    <!-- Right eye -->
    <circle cx="86" cy="76" r="13" fill="white"/>
    <circle id="rpupil" cx="83" cy="79" r="7" fill="#111"/>
    <circle cx="88" cy="72" r="2.5" fill="white"/>
    <!-- Smile (normal) -->
    <path class="mouth-smile" d="M 54 96 Q 70 108 86 96" fill="none" stroke="#1a6e3c" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Open mouth (nom) -->
    <g class="mouth-nom" style="display:none">
      <ellipse cx="70" cy="99" rx="14" ry="11" fill="#111"/>
      <ellipse cx="70" cy="91" rx="14" ry="5" fill="#2ecc71"/>
      <ellipse cx="70" cy="104" rx="8" ry="5" fill="#e74c3c"/>
      <rect x="60" y="90" width="8" height="5" rx="2" fill="white"/>
      <rect x="72" y="90" width="8" height="5" rx="2" fill="white"/>
    </g>
    <!-- Feet -->
    <ellipse cx="56" cy="150" rx="12" ry="6" fill="#27ae60"/>
    <ellipse cx="84" cy="150" rx="12" ry="6" fill="#27ae60"/>
  </svg>
  <div class="snack-counter">🍪 <span id="snack-count">0</span></div>
  <button class="feed-btn" onclick="feedMonster()">Feed me!</button>
  <div class="monster-label">Hungry lil guy</div>
</div>
</div><!-- end .game-wrapper -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ─── Firebase config — must match the host file exactly ──────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyDJ28_e0fMgwZJ7NahQx7gt8_iX2VO2rns",
  authDomain:        "trivia-127b9.firebaseapp.com",
  databaseURL:       "https://trivia-127b9-default-rtdb.firebaseio.com",
  projectId:         "trivia-127b9",
  storageBucket:     "trivia-127b9.firebasestorage.app",
  messagingSenderId: "534126219859",
  appId:             "1:534126219859:web:adb61b3728e25c7d112ca6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myId        = null;
let myName      = '';
let myScore     = 0;
let myAnswers   = {};
let currentQIdx = -1;
let gameStatus  = 'waiting';
let timerInterval = null;
let questions   = [];
const LETTERS   = ['A','B','C','D'];

// ─── UI helpers ───────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

// ─── Join ─────────────────────────────────────────────────────────────────────
async function joinGame() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) { document.getElementById('name-input').focus(); return; }

  document.getElementById('join-btn').disabled = true;

  const snap = await db.ref('players').get();
  const existing = snap.val() || {};
  const taken = Object.values(existing).some(p => p.name?.toLowerCase() === name.toLowerCase());
  if (taken) {
    document.getElementById('join-btn').disabled = false;
    document.getElementById('name-input').focus();
    document.getElementById('name-error').textContent = 'That name is already taken — choose another.';
    return;
  }
  document.getElementById('name-error').textContent = '';

  myName = name;
  myId   = uid();

  await db.ref('players/' + myId).set({ name: myName, score: 0 });

  // Remove player and their responses from Firebase when tab closes
  db.ref('players/' + myId).onDisconnect().remove();
  db.ref('responses/' + myId).onDisconnect().remove();

  document.getElementById('wait-name').textContent = myName;
  showScreen('screen-waiting');

  db.ref('questions').on('value', snap => {
    const qs = snap.val();
    if (qs) questions = Array.isArray(qs) ? qs : Object.values(qs);
  });

  db.ref('players/' + myId + '/score').on('value', snap => {
    const score = snap.val();
    if (score !== null && score !== undefined) myScore = score;
  });

  db.ref('gameState').on('value', snap => {
    const state = snap.val();
    if (state) onGameStateChange(state);
  });
}

// ─── Game state handler ───────────────────────────────────────────────────────
function onGameStateChange(state) {
  if (state.status === 'waiting' && gameStatus === 'gameover') {
    resetToJoin();
    return;
  }

  if (state.status === 'gameover' && gameStatus !== 'gameover') {
    gameStatus = 'gameover';
    db.ref('players').get().then(snap => showGameOver(snap.val() || {}));
    return;
  }

  if (state.status === 'active') {
    const qi = state.currentQ;

    if (qi !== currentQIdx) {
      // New question
      currentQIdx = qi;
      gameStatus  = 'active';
      myAnswers[qi] = undefined;
      showQuestion(qi, state);
    } else if (state.revealed && gameStatus !== 'revealed') {
      gameStatus = 'revealed';
      showReveal(qi, state);
    }
  }
}

// ─── Question screen ──────────────────────────────────────────────────────────
function showQuestion(qi, state) {
  clearInterval(timerInterval);
  const q = questions[qi];
  if (!q) return;

  showScreen('screen-question');
  document.getElementById('p-q-label').textContent = 'Q' + (qi + 1) + ' of ' + questions.length;
  document.getElementById('p-q-text').textContent  = q.question;
  document.getElementById('p-score').textContent   = myScore.toLocaleString();
  document.getElementById('p-result-banner').innerHTML = '';

  const grid = document.getElementById('p-options');
  grid.innerHTML = '';
  q.options.forEach((opt, oi) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<div class="opt-letter">${LETTERS[oi]}</div><span>${opt}</span>`;
    btn.onclick   = () => submitAnswer(qi, oi);
    grid.appendChild(btn);
  });

  // Client-side countdown (cosmetic — host is authoritative)
  const maxTime = state.timeLeft || 30;
  let timeLeft  = maxTime;
  const timerEl = document.getElementById('p-timer');
  timerEl.textContent = timeLeft;
  timerEl.className   = 'timer-chip';

  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = Math.max(0, timeLeft);
    timerEl.className   = 'timer-chip' + (timeLeft <= 10 ? ' urgent' : '');
    if (timeLeft <= 0) clearInterval(timerInterval);
  }, 1000);
}

// ─── Submit answer ────────────────────────────────────────────────────────────
async function submitAnswer(qi, oi) {
  if (myAnswers[qi] !== undefined) return;
  myAnswers[qi] = oi;

  // Highlight selected button
  const btns = document.querySelectorAll('#p-options .opt-btn');
  btns.forEach((b, i) => { b.disabled = true; if (i === oi) b.classList.add('selected'); });
  clearInterval(timerInterval);

  // Atomic write to player-isolated Firebase path — no race condition with other players
  await db.ref('responses/' + myId + '/q' + qi).set(oi);

  gameStatus = 'answered';
  document.getElementById('p-score2').textContent = myScore.toLocaleString();
  showScreen('screen-answered');
}

// ─── Reveal screen ────────────────────────────────────────────────────────────
function showReveal(qi, state) {
  clearInterval(timerInterval);
  const q = questions[qi];
  if (!q) return;

  showScreen('screen-reveal');
  document.getElementById('rv-q-label').textContent = 'Q' + (qi + 1) + ' result';
  document.getElementById('rv-q-text').textContent  = q.question;
  document.getElementById('p-score3').textContent   = myScore.toLocaleString();

  const myAns = myAnswers[qi];
  const correct = q.correct;

  const grid = document.getElementById('rv-options');
  grid.innerHTML = '';
  q.options.forEach((opt, oi) => {
    const btn = document.createElement('button');
    btn.disabled = true;
    let cls = 'opt-btn';
    if (oi === correct)                        cls += ' correct';
    else if (oi === myAns && myAns !== correct) cls += ' wrong';
    btn.className = cls;
    btn.innerHTML = `<div class="opt-letter">${LETTERS[oi]}</div><span>${opt}</span>`;
    grid.appendChild(btn);
  });

  const banner = document.getElementById('rv-result-banner');
  if (myAns === undefined) {
    banner.innerHTML = '<div class="result-banner timeout-r">⏱ Time\'s up — no answer submitted</div>';
  } else if (myAns === correct) {
    banner.innerHTML = '<div class="result-banner correct-r">✓ Correct! Points added to your score</div>';
  } else {
    banner.innerHTML = `<div class="result-banner wrong-r">✗ The correct answer was: ${LETTERS[correct]}: ${q.options[correct]}</div>`;
  }

  // Fetch and render leaderboard
  db.ref('players').get().then(snap => {
    const players = snap.val() || {};
    const sorted = Object.entries(players)
      .map(([id, p]) => ({ id, name: p.name || id.slice(0, 8), score: p.score || 0 }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 10);
    const lb = document.getElementById('rv-lb');
    lb.innerHTML = '';
    sorted.forEach((p, i) => {
      const row = document.createElement('div');
      const medals = ['🥇','🥈','🥉'];
      row.className = 'lb-row' + (i < 3 ? ` rank-${i+1}` : '') + (p.id === myId ? ' me' : '');
      row.innerHTML = `<span class="lb-rank">${i < 3 ? medals[i] : i + 1}</span><span class="lb-name">${p.name}${p.id === myId ? ' (you)' : ''}</span><span class="lb-score">${p.score.toLocaleString()}</span>`;
      lb.appendChild(row);
    });
  });
}

// ─── Game over screen ─────────────────────────────────────────────────────────
function showGameOver(players) {
  db.ref('questions').off();
  db.ref('players/' + myId + '/score').off();
  clearInterval(timerInterval);
  // gameState listener stays alive so we detect when host resets
  showScreen('screen-gameover');
  document.getElementById('final-score').textContent = myScore.toLocaleString();

  const sorted = Object.entries(players)
    .map(([id, p]) => ({ id, name: p.name || id.slice(0, 8), score: p.score || 0 }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  const lb = document.getElementById('final-lb');
  lb.innerHTML = '';
  sorted.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row' + (p.id === myId ? ' me' : '');
    row.innerHTML = `<span class="lb-rank">${i === 0 ? '🏆' : i + 1}</span><span class="lb-name">${p.name}${p.id === myId ? ' (you)' : ''}</span><span class="lb-score">${p.score.toLocaleString()}</span>`;
    lb.appendChild(row);
  });
}

// ─── Reset to join screen (triggered when host resets after game over) ────────
function resetToJoin() {
  db.ref('gameState').off();
  clearInterval(timerInterval);
  myId = null; myName = ''; myScore = 0; myAnswers = {};
  currentQIdx = -1; gameStatus = 'waiting'; questions = [];
  document.getElementById('name-input').value = '';
  document.getElementById('name-error').textContent = '';
  document.getElementById('join-btn').disabled = false;
  showScreen('screen-join');
}

// ─── Theme (player-local, independent of host preference) ────────────────────
function applyTheme() {
  const t = localStorage.getItem('trivia_player_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-toggle').textContent = t === 'dark' ? '🌙' : t === 'dim' ? '🌓' : '☀️';
  document.getElementById('theme-toggle').title = t === 'dark' ? 'Dark mode' : t === 'dim' ? 'Dim mode' : 'Light mode';
}
function toggleTheme() {
  const cycle = { dark: 'dim', dim: 'light', light: 'dark' };
  const next = cycle[localStorage.getItem('trivia_player_theme') || 'dark'];
  localStorage.setItem('trivia_player_theme', next);
  applyTheme();
}
applyTheme();

// ─── Monster ──────────────────────────────────────────────────────────────────
let snackCount = 0;
function feedMonster() {
  snackCount++;
  document.getElementById('snack-count').textContent = snackCount;

  // Launch a pellet from the button up toward the monster
  const pellet = document.createElement('div');
  pellet.className = 'pellet';
  document.querySelector('.monster-sidebar').appendChild(pellet);
  pellet.addEventListener('animationend', () => pellet.remove());

  // Trigger nom when pellet arrives (~0.4s into 0.55s flight)
  setTimeout(() => {
    const svg = document.querySelector('.monster-svg');
    svg.classList.remove('eating');
    void svg.offsetWidth; // force reflow so animation restarts
    svg.classList.add('eating');
    setTimeout(() => svg.classList.remove('eating'), 520);
  }, 380);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });
</script>
