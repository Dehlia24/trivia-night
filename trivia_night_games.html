<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Night — Active Games</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1f1f1f; --border: rgba(255,255,255,0.15);
    --accent: #e02424; --accent2: #ff5252; --green: #3dd68c; --red: #e02424;
    --text: #ffffff; --muted: #9a9a9a;
    --font-head: 'Nunito', sans-serif; --font-body: 'Inter', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo { font-family: var(--font-head); font-size: 20px; font-weight: 800; }
  .logo span { color: var(--accent); }
  .logo .sub { color: var(--muted); font-size: 13px; font-weight: 400; margin-left: 6px; }

  .container { max-width: 860px; margin: 0 auto; padding: 36px 24px; }

  .page-title { font-family: var(--font-head); font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .page-sub   { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

  .new-game-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    padding: 10px 20px; cursor: pointer; transition: background 0.15s; text-decoration: none;
    margin-bottom: 28px;
  }
  .new-game-btn:hover { background: #b81c1c; }

  #games-list { display: flex; flex-direction: column; gap: 12px; }

  .game-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; display: flex; align-items: center; gap: 16px;
    transition: border-color 0.2s;
  }
  .game-card.live  { border-color: rgba(61,214,140,0.35); }
  .game-card.ended { opacity: 0.5; }

  .game-info { flex: 1; min-width: 0; }
  .game-name { font-family: var(--font-head); font-size: 17px; font-weight: 800; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .game-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .game-code { font-family: var(--font-head); font-weight: 800; letter-spacing: 2px; color: var(--accent2); }
  .game-status {
    padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  }
  .status-waiting { background: rgba(255,255,255,0.08); color: var(--muted); }
  .status-active  { background: rgba(61,214,140,0.12); color: var(--green); border: 1px solid rgba(61,214,140,0.3); }
  .status-gameover{ background: rgba(255,255,255,0.06); color: var(--muted); }

  .game-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .join-btn {
    padding: 8px 16px; border-radius: 8px; border: none; background: var(--accent); color: #fff;
    font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background 0.15s; text-decoration: none; display: inline-flex; align-items: center;
  }
  .join-btn:hover { background: #b81c1c; }
  .join-btn.disabled { background: rgba(255,255,255,0.06); color: var(--muted); cursor: default; pointer-events: none; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .big { font-size: 40px; margin-bottom: 14px; }
  .empty-state p { font-size: 15px; margin-bottom: 6px; }

  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  .refresh-note { font-size: 12px; color: var(--muted); text-align: right; margin-top: 16px; }

  /* ── Dim mode ── */
  html[data-theme="dim"] { --bg:#252525; --surface:#2f2f2f; --surface2:#383838; --border:rgba(255,255,255,0.12); --text:#e8e8e8; --muted:#888888; }
  /* ── Light mode ── */
  html[data-theme="light"] { --bg:#f0f0f0; --surface:#ffffff; --surface2:#e8e8e8; --border:rgba(0,0,0,0.12); --text:#111111; --muted:#555555; }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .container { padding: 24px 16px; }
    .game-card { flex-direction: column; align-items: flex-start; gap: 12px; }
    .game-actions { width: 100%; }
    .join-btn { flex: 1; justify-content: center; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">Trivia<span>Night</span><span class="sub">Active Games</span></div>
  <a class="new-game-btn" href="trivia_night_host_dashboard.html">+ New Game</a>
</header>

<div class="container">
  <div class="page-title">Active Games</div>
  <div class="page-sub">Live and upcoming trivia sessions. Updates in real time.</div>

  <div id="games-list"><div class="loading">Loading games…</div></div>
  <div class="refresh-note" id="last-updated"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "AIzaSyDJ28_e0fMgwZJ7NahQx7gt8_iX2VO2rns",
  authDomain:        "trivia-127b9.firebaseapp.com",
  databaseURL:       "https://trivia-127b9-default-rtdb.firebaseio.com",
  projectId:         "trivia-127b9",
  storageBucket:     "trivia-127b9.firebasestorage.app",
  messagingSenderId: "534126219859",
  appId:             "1:534126219859:web:adb61b3728e25c7d112ca6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const FOUR_HOURS = 4 * 60 * 60 * 1000;

function playerUrl(code) {
  return location.origin + location.pathname.replace('trivia_night_games.html', 'trivia_night_player.html') + '?code=' + code;
}
function hostUrl(code) {
  return location.origin + location.pathname.replace('trivia_night_games.html', 'trivia_night_host_dashboard.html') + '?code=' + code;
}

async function cleanupExpired(games) {
  const cutoff = Date.now() - FOUR_HOURS;
  for (const [code, game] of Object.entries(games)) {
    if (game.endedAt && game.endedAt < cutoff) {
      await db.ref('games/' + code).remove();
    }
  }
}

function renderGames(games) {
  const list = document.getElementById('games-list');
  const cutoff = Date.now() - FOUR_HOURS;

  // Filter out fully-expired ended sessions
  const visible = Object.entries(games).filter(([, g]) => {
    if (g.endedAt && g.endedAt < cutoff) return false;
    return true;
  });

  // Sort: waiting first, then active, then gameover; within each by createdAt desc
  const order = { waiting: 0, active: 1, gameover: 2 };
  visible.sort(([, a], [, b]) => {
    const sa = a.gameState?.status || 'waiting';
    const sb = b.gameState?.status || 'waiting';
    if (order[sa] !== order[sb]) return order[sa] - order[sb];
    return (b.createdAt || 0) - (a.createdAt || 0);
  });

  if (visible.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="big">🎮</div>
        <p>No active games right now.</p>
        <p style="font-size:13px;">Start one by clicking <strong>+ New Game</strong> above.</p>
      </div>`;
    return;
  }

  list.innerHTML = '';
  for (const [code, game] of visible) {
    const status  = game.gameState?.status || 'waiting';
    const name    = game.name || 'Unnamed Game';
    const players = Object.keys(game.players || {}).length;
    const created = game.createdAt ? new Date(game.createdAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
    const isEnded = status === 'gameover';

    const statusLabel = { waiting: 'Waiting', active: '● Live', gameover: 'Ended' }[status] || status;
    const statusClass = { waiting: 'status-waiting', active: 'status-active', gameover: 'status-gameover' }[status];

    const card = document.createElement('div');
    card.className = 'game-card' + (status === 'active' ? ' live' : isEnded ? ' ended' : '');
    card.innerHTML = `
      <div class="game-info">
        <div class="game-name">${name}</div>
        <div class="game-meta">
          <span class="game-code">${code}</span>
          <span class="game-status ${statusClass}">${statusLabel}</span>
          <span>${players} player${players !== 1 ? 's' : ''}</span>
          ${created ? `<span>Started ${created}</span>` : ''}
        </div>
      </div>
      <div class="game-actions">
        <a class="join-btn${isEnded ? ' disabled' : ''}" href="${isEnded ? '#' : playerUrl(code)}">
          ${isEnded ? 'Ended' : 'Join as Player'}
        </a>
      </div>`;
    list.appendChild(card);
  }

  document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
}

// Real-time listener
db.ref('games').on('value', snap => {
  const games = snap.val() || {};
  renderGames(games);
  cleanupExpired(games);
});

// Apply saved theme
const theme = localStorage.getItem('trivia_host_theme') || localStorage.getItem('trivia_player_theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);
</script>
</body>
</html>
